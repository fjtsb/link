<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>輔仁聖博敏神學院 - 官方入口</title>
<style>
  :root {
    --primary-blue: #004a99; /* 主色：深藍 */
    --accent-gold: #c5a059;   /* 副色：金色點綴 */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .phone-wrap { display: flex; justify-content: center; padding: 2rem 0; }
  .phone {
    width: 320px;
    background: #fff;
    border-radius: 40px;
    border: 8px solid #333;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
  }
  
  /* 頂部 Header */
  .header {
    background: var(--primary-blue);
    padding: 40px 20px 30px;
    text-align: center;
    color: #fff;
  }
  .header-logo {
    width: 100px;
    height: 100px;
    background: #fff;
    border-radius: 50%;
    margin: 0 auto 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 5px;
  }
  .header-logo img { width: 90%; height: 90%; object-fit: contain; }
  .header-name { font-size: 18px; font-weight: bold; margin-bottom: 5px; }
  .header-sub { font-size: 12px; opacity: 0.8; }

  /* 內容區 */
  .body { padding: 20px; background: #f9f9f9; }
  
  /* 按鈕區 */
  .link-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
  .link-item {
    display: flex; align-items: center; gap: 15px;
    background: #fff; border: 1px solid #ddd;
    padding: 12px 20px; border-radius: 50px;
    text-decoration: none; color: #333;
    font-weight: 600; font-size: 14px;
    transition: 0.3s;
  }
  .link-item:hover { background: var(--primary-blue); color: #fff; }
  
  .section-title { font-size: 12px; color: #888; margin-bottom: 10px; padding-left: 5px; }

  /* 底部卡片 */
  .footer-card {
    background: var(--primary-blue);
    color: #fff;
    padding: 20px;
    border-radius: 20px;
    text-align: center;
    margin-top: 20px;
  }
  .footer-title { font-size: 14px; font-weight: bold; margin-bottom: 8px; }
  .footer-text { font-size: 12px; line-height: 1.5; opacity: 0.9; }
</style>
</head>
<body>

<div class="phone-wrap">
  <div class="phone">
    <div class="header">
      <div class="header-logo">
        <img src="圓形logo.jpg" alt="Logo">
      </div>
      <div class="header-name">天主教輔仁聖博敏神學院</div>
      <div class="header-sub">Fu Jen Faculty of Theology of St. Robert Bellarmine</div>
    </div>

    <div class="body">
      <div class="section-title">連結列表</div>
      <div class="link-list">
        <a href="https://www.facebook.com/FJTSB/" class="link-item">Facebook 官方粉絲專頁</a>
        <a href="https://www.instagram.com/fjtsb.fj/" class="link-item">Instagram 生活點滴</a>
        <a href="https://www.youtube.com/@FJTSB" class="link-item">YouTube 講座與影音</a>
        <a href="https://theology.catholic.org.tw/J/" class="link-item">官方網站首頁</a>
      </div>

      <div class="footer-card">
        <div class="footer-title">認識天主，認識自我</div>
        <div class="footer-text">2026 秋季夜間神學課程 招生中<br>歡迎教友報名，豐富信仰生活</div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
