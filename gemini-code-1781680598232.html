<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>輔仁聖博敏神學院 - 介面展示</title>
<style>
    :root { --primary-blue: #004a99; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
    
    /* 手機外框 */
    .phone { width: 320px; height: 640px; background: #fff; border-radius: 40px; border: 8px solid #222; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
    
    /* 頂部區 */
    .header { background: var(--primary-blue); padding: 30px 20px 20px; text-align: center; color: #fff; }
    .logo-box { width: 80px; height: 80px; background: white; border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .logo-box img { width: 90%; }
    .title { font-size: 16px; font-weight: bold; }

    /* 滾動內容區 */
    .content { flex: 1; overflow-y: auto; padding: 15px; }
    
    /* 影片輪播 */
    .video-container { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 15px; overflow: hidden; position: relative; }
    .video-slide { display: none; width: 100%; height: 100%; }
    .video-slide.active { display: block; }
    .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.7); border: none; padding: 5px 10px; cursor: pointer; border-radius: 5px; }
    .prev { left: 5px; } .next { right: 5px; }

    /* 連結清單 */
    .section-label { font-size: 12px; color: #666; margin: 15px 0 8px 5px; font-weight: bold; }
    .link-list { display: flex; flex-direction: column; gap: 10px; }
    .link-item { background: #f8f9fa; border: 1px solid #ddd; padding: 12px; border-radius: 12px; text-decoration: none; color: #333; font-weight: 600; text-align: center; transition: 0.2s; }
    .link-item:hover { background: var(--primary-blue); color: white; }
</style>
</head>
<body>

<div class="phone">
    <div class="header">
        <div class="logo-box">
            <img src="圓形logo.jpg" alt="Logo">
        </div>
        <div class="title">天主教輔仁聖博敏神學院</div>
    </div>

    <div class="content">
        <div class="section-label">2026 秋季課程影音</div>
        <div class="video-container">
            <iframe class="video-slide active" src="https://www.youtube.com/watch?v=fSLkddX74jU&t=3s" frameborder="0" allowfullscreen></iframe>
            <iframe class="video-slide" src="https://www.youtube.com/watch?v=y28--mPhM98&t=3s" frameborder="0" allowfullscreen></iframe>
            <iframe class="video-slide" src="https://www.youtube.com/watch?v=DfEOMPBJjAs" frameborder="0" allowfullscreen></iframe>
            <button class="nav-btn prev" onclick="move(-1)">◀</button>
            <button class="nav-btn next" onclick="move(1)">▶</button>
        </div>

        <div class="section-label">快速連結</div>
        <div class="link-list">
            <a href="https://theology.catholic.org.tw/J/" class="link-item">官方網站</a>
            <a href="https://www.facebook.com/FJTSB/" class="link-item">Facebook 粉絲專頁</a>
            <a href="https://www.instagram.com/fjtsb.fj/" class="link-item">Instagram 生活點滴</a>
            <a href="https://www.youtube.com/@FJTSB" class="link-item">YouTube 頻道</a>
        </div>
    </div>
</div>

<script>
    let index = 0;
    const slides = document.querySelectorAll('.video-slide');
    function move(n) {
        slides[index].classList.remove('active');
        index = (index + n + slides.length) % slides.length;
        slides[index].classList.add('active');
    }
</script>
</body>
</html>
